<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursor IDE Style Dynamic Menu (Web)</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1e1e1e;
      color: #cccccc;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* ===== TITLE BAR ===== */
    .titlebar {
      display: flex;
      align-items: center;
      background: #252526;
      height: 30px;
      padding: 0 12px;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
      gap: 8px;
    }
    .titlebar-icon { width: 16px; height: 16px; opacity: 0.9; }
    .search-bar { flex: 1; display: flex; justify-content: center; }
    .search-input {
      display: flex; align-items: center; gap: 6px;
      background: #3c3c3c; border: 1px solid #555;
      border-radius: 5px; padding: 2px 12px; width: 300px; cursor: text;
      font-size: 12px; color: #888;
    }
    .titlebar-right { display: flex; align-items: center; gap: 8px; }
    .upgrade-btn {
      font-size: 11px; color: #ccc; background: #0e639c;
      border: none; padding: 2px 8px; border-radius: 3px; cursor: pointer;
    }
    .upgrade-btn:hover { background: #1177bb; }

    /* ===== MENU BAR ===== */
    .menubar {
      display: flex; align-items: stretch;
      background: #3c3c3c; height: 30px; padding: 0 4px;
      position: relative; z-index: 1000; flex-shrink: 0;
    }
    .menu-item { position: relative; }
    .menu-trigger {
      display: flex; align-items: center; padding: 0 8px; height: 30px;
      font-size: 13px; color: #cccccc; cursor: pointer; border-radius: 4px;
      transition: background 0.08s; white-space: nowrap;
    }
    .menu-trigger:hover,
    .menu-item.open .menu-trigger { background: #505050; color: #fff; }

    /* ===== DROPDOWN ===== */
    .dropdown {
      display: none; position: absolute; top: 100%; left: 0;
      min-width: 280px; background: #252526;
      border: 1px solid #454545; border-radius: 5px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.55);
      padding: 4px 0; z-index: 2000;
      animation: fadeDown 0.08s ease;
    }
    .menu-item.open .dropdown { display: block; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== DROPDOWN ITEMS ===== */
    .dd-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 12px 4px 20px; min-height: 26px;
      font-size: 13px; color: #cccccc; cursor: pointer;
      position: relative; gap: 30px;
    }
    .dd-item:hover { background: #04395e; color: #fff; }
    .dd-item.disabled { color: #555; cursor: default; pointer-events: none; }
    .dd-shortcut { font-size: 11px; color: #888; white-space: nowrap; flex-shrink: 0; }
    .dd-item:hover .dd-shortcut { color: #aaa; }
    .dd-arrow { font-size: 10px; color: #888; }
    .dd-sep { height: 1px; background: #454545; margin: 4px 0; }

    /* ===== SUBMENU ===== */
    .dd-item.has-sub .submenu {
      display: none; position: absolute; top: -5px; left: 100%;
      min-width: 220px; background: #252526;
      border: 1px solid #454545; border-radius: 5px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.55);
      padding: 4px 0; z-index: 3000;
    }
    .dd-item.has-sub:hover .submenu { display: block; }

    /* ===== WORKSPACE ===== */
    .workspace {
      flex: 1; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 24px;
    }
    .cursor-logo { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .cursor-logo svg { width: 56px; height: 56px; }
    .cursor-logo-text { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 3px; }
    .cursor-plan { font-size: 12px; color: #777; }
    .cursor-plan a { color: #3794ff; text-decoration: none; }
    .cursor-plan a:hover { text-decoration: underline; }

    .action-buttons { display: flex; gap: 12px; }
    .action-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 20px; border: 1px solid #454545;
      border-radius: 6px; background: #2d2d30;
      color: #ccc; font-size: 13px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .action-btn:hover { background: #37373d; border-color: #666; color: #fff; }
    .action-btn .btn-icon { font-size: 16px; }

    .recent-projects { text-align: left; }
    .recent-label {
      font-size: 11px; color: #666; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .recent-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; gap: 60px;
    }
    .recent-item:hover { background: #2a2d2e; }
    .recent-name { font-size: 13px; color: #ccc; }
    .recent-path { font-size: 11px; color: #555; }

    /* ===== STATUS BAR ===== */
    .statusbar {
      display: flex; align-items: center;
      background: #007acc; height: 22px; padding: 0 10px;
      gap: 12px; flex-shrink: 0;
    }
    .status-item { font-size: 11px; color: #fff; opacity: 0.9; }

    /* ===== OVERLAY ===== */
    #overlay {
      display: none; position: fixed; inset: 0; z-index: 999;
    }
    #overlay.active { display: block; }
  </style>
</head>
<body>

<div id="overlay"></div>

<!-- TITLE BAR -->
<div class="titlebar">
  <svg class="titlebar-icon" viewBox="0 0 100 100" fill="none">
    <rect width="100" height="100" rx="18" fill="#1a1a1a"/>
    <path d="M25 20 L75 20 L75 55 L50 82 L25 55 Z" fill="#fff" opacity="0.85"/>
    <path d="M50 20 L75 20 L75 55 L50 55 Z" fill="#3794ff" opacity="0.75"/>
  </svg>
  <div class="search-bar">
    <div class="search-input">🔍&nbsp; Search</div>
  </div>
  <div class="titlebar-right">
    <button class="upgrade-btn">Upgrade to Pro</button>
  </div>
</div>

<!-- MENU BAR (Dynamically populated) -->
<div class="menubar" id="menubar">
  <div style="color: #888; font-size: 12px; padding: 6px 12px; display: flex; align-items: center;">메뉴 설정 로딩 중...</div>
</div>

<!-- WORKSPACE -->
<div class="workspace">
  <div class="cursor-logo">
    <svg viewBox="0 0 100 100" fill="none">
      <rect width="100" height="100" rx="18" fill="#1a1a1a"/>
      <path d="M25 20 L75 20 L75 55 L50 82 L25 55 Z" fill="#fff" opacity="0.85"/>
      <path d="M50 20 L75 20 L75 55 L50 55 Z" fill="#3794ff" opacity="0.75"/>
    </svg>
    <div class="cursor-logo-text">CURSOR (WEB)</div>
    <div class="cursor-plan">Free Plan · <a href="#">Upgrade</a></div>
  </div>
  <div class="action-buttons">
    <button class="action-btn"><span class="btn-icon">📁</span><span>Open project</span></button>
    <button class="action-btn"><span class="btn-icon">⎘</span><span>Clone repo</span></button>
    <button class="action-btn"><span class="btn-icon">⊞</span><span>Connect via SSH</span></button>
  </div>
  <div class="recent-projects">
    <div class="recent-label">Recent projects</div>
    <div class="recent-item"><span class="recent-name">test1</span><span class="recent-path">D:\Temp\Cursor</span></div>
    <div class="recent-item"><span class="recent-name">Cursor</span><span class="recent-path">D:\Temp</span></div>
    <div class="recent-item"><span class="recent-name">html</span><span class="recent-path">D:\Temp</span></div>
    <div class="recent-item"><span class="recent-name">test2</span><span class="recent-path">C:\Users\SBS\Documents\Cursor</span></div>
    <div class="recent-item"><span class="recent-name">test1</span><span class="recent-path">C:\Users\SBS\Documents\Cursor</span></div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <span class="status-item" id="status-info">⌀ 0 △ 0</span>
  <span class="status-item" style="margin-left:auto;">Cursor Tab</span>
</div>

<script>
  const menubar  = document.getElementById('menubar');
  const overlay  = document.getElementById('overlay');
  const statusInfo = document.getElementById('status-info');
  let   openItem = null;

  // 1. JSON 불러와서 동적 메뉴 그리기
  async function initDynamicMenu() {
    // 로컬 menu_config.json 우선 시도, 실패 시 기 설정된 원격 주소 시도 가능
    const localUrl = 'menu_config.json';
    const remoteUrl = 'https://raw.githubusercontent.com/bsshin1960/fulldown/main/menu_config.json'; // 본인 주소로 교체 가능

    let config = null;
    try {
      const response = await fetch(localUrl);
      if (response.ok) {
        config = await response.json();
        statusInfo.textContent = '⌀ 0 △ 0 (로컬 설정 로딩 완료)';
      }
    } catch (e) {
      console.warn("로컬 JSON 로드 실패, Fallback 데이터 로드 시도", e);
    }

    if (!config) {
      // Fallback 기본 내장 설정
      config = {
        "File": [
          {"label": "New Text File", "shortcut": "Ctrl+N"},
          {"label": "New Window", "shortcut": "Ctrl+Shift+N"},
          {"separator": true},
          {"label": "Exit"}
        ],
        "Help": [
          {"label": "About"}
        ]
      };
      statusInfo.textContent = '⌀ 0 △ 0 (Fallback 기본 설정 로딩됨)';
    }

    buildMenuBar(config);
  }

  // 메뉴바 빌드
  function buildMenuBar(config) {
    menubar.innerHTML = '';
    
    Object.keys(config).forEach(menuName => {
      const menuItem = document.createElement('div');
      menuItem.className = 'menu-item';
      menuItem.setAttribute('data-menu', menuName.toLowerCase());

      const trigger = document.createElement('div');
      trigger.className = 'menu-trigger';
      trigger.textContent = menuName;
      menuItem.appendChild(trigger);

      const dropdown = buildSubmenu(config[menuName], true);
      menuItem.appendChild(dropdown);

      menubar.appendChild(menuItem);
    });

    attachMenuEvents();
  }

  // 하위 드롭다운/서브메뉴 빌드 (재귀)
  function buildSubmenu(items, isTopLevel = false) {
    const container = document.createElement('div');
    container.className = isTopLevel ? 'dropdown' : 'submenu';

    items.forEach(item => {
      if (item.separator) {
        const sep = document.createElement('div');
        sep.className = 'dd-sep';
        container.appendChild(sep);
      } else if (item.submenu) {
        const row = document.createElement('div');
        row.className = 'dd-item has-sub';

        const labelSpan = document.createElement('span');
        labelSpan.textContent = item.label;
        row.appendChild(labelSpan);

        const arrowSpan = document.createElement('span');
        arrowSpan.className = 'dd-arrow';
        arrowSpan.textContent = '▶';
        row.appendChild(arrowSpan);

        // 재귀 호출로 하위 서브메뉴 추가
        const subDropdown = buildSubmenu(item.submenu, false);
        row.appendChild(subDropdown);

        container.appendChild(row);
      } else {
        const row = document.createElement('div');
        row.className = 'dd-item';
        if (item.disabled) row.classList.add('disabled');

        const labelSpan = document.createElement('span');
        labelSpan.textContent = item.label;
        row.appendChild(labelSpan);

        if (item.shortcut) {
          const shortcutSpan = document.createElement('span');
          shortcutSpan.className = 'dd-shortcut';
          shortcutSpan.textContent = item.shortcut;
          row.appendChild(shortcutSpan);
        }

        // 클릭 액션
        row.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!item.disabled) {
            if (item.label === 'Full Screen') {
              toggleFullscreen();
            } else {
              alert(`[클릭된 메뉴]: ${item.label}`);
            }
            closeAll();
          }
        });

        container.appendChild(row);
      }
    });

    return container;
  }

  // 2. 이벤트 바인딩
  function attachMenuEvents() {
    const items = menubar.querySelectorAll('.menu-item');
    items.forEach(item => {
      const trigger = item.querySelector('.menu-trigger');

      trigger.addEventListener('click', e => {
        e.stopPropagation();
        if (item.classList.contains('open')) { closeAll(); }
        else { openMenu(item); }
      });

      trigger.addEventListener('mouseenter', () => {
        if (openItem && openItem !== item) openMenu(item);
      });
    });
  }

  function openMenu(item) {
    closeAll(false);
    item.classList.add('open');
    overlay.classList.add('active');
    openItem = item;
  }

  function closeAll(reset = true) {
    const items = menubar.querySelectorAll('.menu-item');
    items.forEach(i => i.classList.remove('open'));
    overlay.classList.remove('active');
    if (reset) openItem = null;
  }

  overlay.addEventListener('click', closeAll);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAll(); });

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(err => {
        alert(`전체 화면 모드를 실행할 수 없습니다: ${err.message}`);
      });
    } else {
      document.exitFullscreen();
    }
  }

  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registered', reg))
        .catch(err => console.error('Service Worker registration failed', err));
    });
  }

  // 실행
  initDynamicMenu();
</script>
</body>
</html>
